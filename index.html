<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteVerify v17.x</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="logo-container">
        <img src="siteverify_logo.png" alt="SiteVerify Logo" class="app-logo">
    </div>

    <div id="settings-screen" class="panel">
        <h2 class="section-title">System Settings</h2>
        
        <div class="field-group">
            <label for="userName">User Name</label>
            <input type="text" id="userName" placeholder="Enter full name">
        </div>

        <div class="field-group">
            <label for="userEmail">User Email</label>
            <input type="email" id="userEmail" placeholder="name@example.com">
        </div>

        <div class="field-group">
            <label for="userHandphone">User Phone Number</label>
            <input type="tel" id="userHandphone" placeholder="e.g. 0123456789">
        </div>

        <div class="field-group">
            <label for="recipientEmail">Recipient Email</label>
            <input type="email" id="recipientEmail" placeholder="recipient@example.com">
        </div>

        <div class="field-group">
            <label for="whatsappPhone">Recipient Phone Number</label>
            <input type="tel" id="whatsappPhone" placeholder="e.g. 0123456789">
        </div>

        <div class="action-area">
            <button id="save-settings" class="btn-primary">Save System Settings</button>
        </div>
    </div>

    <div id="main-screen" class="panel" style="display:none;">
        <div class="action-area">
            <button id="open-camera" class="btn-primary">1. Open Site Camera</button>
            <button id="save-device" class="btn-secondary">Save to Device</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
