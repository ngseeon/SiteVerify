<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify v17.x</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>

    <header id="main-header" class="app-header">
        <div class="header-top">
            <span id="gps-status" class="gps-on">GPS : ON</span>
            <div id="settings-gear" class="gear-icon">⚙</div>
        </div>
        <div class="logo-container">
            <img src="siteverify_logo.png" alt="SiteVerify Logo" class="app-logo">
        </div>
        <div class="header-bottom">
            <div class="location-group">
                <span class="globe-icon">🌐</span>
                <span id="location-name">Horizon Hills</span>
            </div>
            <span id="live-clock">17 April 2026 10:00:00</span>
        </div>
        <hr class="divider">
    </header>

    <main id="app-viewport">
        <section id="settings-screen" class="form-container">
            <h2 class="section-title">System Settings</h2>
            <div class="input-wrapper"><label>User Name</label><input type="text" id="userName"></div>
            <div class="input-wrapper"><label>User Email</label><input type="email" id="userEmail"></div>
            <div class="input-wrapper"><label>User Phone Number</label><input type="tel" id="userHandphone"></div>
            <div class="input-wrapper"><label>Recipient Email</label><input type="email" id="recipientEmail"></div>
            <div class="input-wrapper"><label>Recipient Phone Number</label><input type="tel" id="whatsappPhone"></div>
            <button id="save-settings" class="btn-red-full">Save System Settings</button>
        </section>

        <section id="menu-screen" style="display:none;">
            <div class="menu-grid">
                <button id="nav-capture" class="btn-action">Capture</button>
                <button class="btn-action">History</button>
            </div>
        </section>

        <section id="camera-screen" class="full-screen-ui" style="display:none;">
            <div class="viewfinder">
                <video id="video-feed" autoplay playsinline></video>
                <canvas id="capture-canvas" style="display:none;"></canvas>
            </div>
            <div class="camera-controls">
                <button id="shutter-btn" class="btn-red-half">Capture</button>
                <button id="camera-back" class="btn-red-half">Back</button>
            </div>
        </section>

        <section id="pin-screen" class="full-screen-ui" style="display:none;">
            <div class="preview-area">
                <img id="verify-preview" class="fit-image">
            </div>
            <div class="verification-bar">
                <div class="pin-display">Enter Security PIN: <span id="display-pin">----</span></div>
                <input type="number" id="pin-input" pattern="\d*" inputmode="numeric">
                <button id="verify-pin-btn" class="btn-red-full">Verify & Generate</button>
            </div>
        </section>

        <section id="preview-screen" class="full-screen-ui" style="display:none;">
            <div class="preview-area">
                <img id="final-image-preview" class="fit-image">
            </div>
            <div class="save-bar">
                <button id="save-to-device" class="btn-green-full">Save to Device</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
