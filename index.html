<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteVerify v17.x</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="status-bar">
            <span id="gps-status" class="gps-on">GPS : ON</span>
            <div class="settings-icon"></div>
        </div>
        
        <div class="logo-area">
            <img src="siteverify_logo.png" alt="SiteVerify Logo" class="app-logo">
        </div>

        <div class="env-info">
            <span id="location-name">Detecting Location...</span>
            <span id="live-clock">00 Month 0000 00:00:00</span>
        </div>
    </header>

    <hr class="header-divider">

    <main class="container">
        <section id="settings-screen" class="panel">
            <h2 class="panel-title">System Settings</h2>
            
            <div class="field">
                <label>User Name</label>
                <input type="text" id="userName" placeholder="Enter full name">
            </div>

            <div class="field">
                <label>User Email</label>
                <input type="email" id="userEmail" placeholder="name@example.com">
            </div>

            <div class="field">
                <label>User Phone Number</label>
                <input type="tel" id="userHandphone" placeholder="e.g. 0123456789">
            </div>

            <div class="field">
                <label>Recipient Email</label>
                <input type="email" id="recipientEmail" placeholder="recipient@example.com">
            </div>

            <div class="field">
                <label>Recipient Phone Number</label>
                <input type="tel" id="whatsappPhone" placeholder="e.g. 0123456789">
            </div>

            <button id="save-settings" class="btn-primary">Save System Settings</button>
        </section>

        <section id="menu-screen" class="panel" style="display:none;">
            <div class="menu-grid">
                <button class="btn-menu">CAPTURE</button>
                <button class="btn-menu">HISTORY</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
