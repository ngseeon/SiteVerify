<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteVerify v17.x - Phase 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="SiteVerify Logo" class="app-logo">
    </div>

    <div class="settings-panel">
        <h2>System Settings</h2>
        <div class="input-group">
            <input type="text" id="userName" placeholder="User Name">
            <input type="email" id="userEmail" placeholder="User Email">
            <input type="tel" id="userHandphone" placeholder="User Handphone">
            <input type="email" id="recipientEmail" placeholder="Recipient Email">
            <input type="tel" id="whatsappPhone" placeholder="WhatsApp Phone">
        </div>
    </div>

    <div class="action-area">
        <button id="open-camera" class="btn-primary">1. Open Site Camera</button>
        <button id="save-device" class="btn-secondary">Save to Device</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
