<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify v17.9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="app-header">
        <div class="header-top">
            <span id="gps-status">GPS: PENDING</span>
            <span id="settings-gear" style="cursor:pointer">⚙</span>
        </div>
        <div class="logo-box">
            <img src="siteverify_logo.png" alt="Logo" class="app-logo">
        </div>
        <div class="header-bottom">
            <span>🌐 Endau, Johor</span>
            <span id="live-clock">--/--/----, --:--:--</span>
        </div>
        <hr class="header-line">
    </header>

    <section id="menu-screen" class="app-screen">
        <div class="action-bar">
            <button id="nav-capture" class="btn-red">Capture</button>
            <button id="nav-history" class="btn-red">History</button>
        </div>
    </section>

    <section id="settings-screen" class="app-screen" style="display:none">
        <div class="settings-container">
            <h2>System Settings</h2>
            <div class="field-group"><label>User Name</label><input type="text" value="NG SEE ON"></div>
            <div class="field-group"><label>User Email</label><input type="email" value="ngseeon@gmail.com"></div>
            <div class="field-group"><label>User Phone Number</label><input type="text" value="+6012738393"></div>
            <div class="field-group"><label>Recipient Email</label><input type="email" value="seeon.ng@gmail.com"></div>
            <div class="field-group"><label>Recipient Phone Number</label><input type="text" value="+60175783133"></div>
            <button id="save-settings" class="btn-red-wide">Save System Setting</button>
        </div>
    </section>

    <section id="camera-screen" class="app-screen full-view" style="display:none">
        <video id="video-feed" autoplay playsinline></video>
        <div class="action-bar">
            <button id="shutter" class="btn-red">Capture</button>
            <button id="cam-back" class="btn-red">Back</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
