<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <div class="header-top">
            <span id="gps-status">GPS : ON</span>
            <span id="settings-gear">⚙</span>
        </div>
        <div class="logo-box">
            <img src="siteverify_logo.png" class="app-logo">
        </div>
        <div class="header-bottom">
            <span>🌐 Horizon Hills</span>
            <span id="live-clock">17 April 2026 21:50:00</span>
        </div>
        <hr class="header-line">
    </header>

    <main id="menu-screen">
        <div class="action-bar">
            <button id="nav-capture" class="btn-red">Capture</button>
            <button id="nav-history" class="btn-red">History</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
