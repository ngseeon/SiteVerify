<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify v25.5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <header id="app-header">
        <div class="header-content">
            <div class="header-row-top">
                <span id="gps-status">GPS: PENDING</span>
                <span id="settings-gear" class="clickable-gear">⚙</span>
            </div>
            <div class="logo-area">
                <img src="siteverify_logo.png" alt="Logo" class="app-logo">
            </div>
            <div class="header-row-bottom">
                <span id="location-display">🌐 Detecting...</span>
                <span id="live-clock">--/--/----, --:--:--</span>
            </div>
        </div>
        <hr class="header-divider">
    </header>

    <section id="menu-screen" class="app-screen">
        <div class="action-bar-bottom">
            <button id="nav-capture" class="btn-red">SiteVerify</button>
            <button id="nav-history" class="btn-red">History</button>
        </div>
    </section>

    <section id="settings-screen" class="app-screen" style="display:none">
        <div class="form-container">
            <h2 class="section-title">System Settings</h2>
            <div class="field"><label>User Name</label><input type="text" id="set-name"></div>
            <div class="field"><label>User Email</label><input type="email" id="set-email"></div>
            <div class="field"><label>Handphone No.</label><input type="tel" id="set-phone"></div>
            <div class="field"><label>Recipient Email</label><input type="email" id="set-rec-email"></div>
            <div class="field"><label>WhatsApp Phone</label><input type="tel" id="set-wa"></div>
            <div class="action-bar-bottom">
                <button id="save-settings" class="btn-red-wide">Save & Close</button>
            </div>
        </div>
    </section>

    <section id="input-screen" class="app-screen" style="display:none">
        <div class="form-container">
            <h2 class="section-title">SiteVerify Initialization</h2>
            <div class="field"><label>Job ID (Optional)</label><input type="text" id="job-id-input" placeholder="Defaults to 'Null'"></div>
            <div id="pin-display" class="pin-info">Security PIN: --</div>
            <div class="field"><label>Enter PIN</label><input type="number" id="pin-verification"></div>
            <div class="action-bar-bottom">
                <button id="unlock-camera" class="btn-red">Unlock Camera</button>
                <button id="cancel-init" class="btn-red">Cancel</button>
            </div>
        </div>
    </section>

    <section id="camera-screen" class="app-screen camera-view" style="display:none">
        <video id="video-feed" autoplay playsinline></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        
        <div id="review-overlay" class="overlay-screen" style="display:none">
            <img id="final-document" class="baked-img">
            <div id="qr-loading-status" class="qr-status-msg">
                Generating the QRCode
                <div class="corner-spinner"></div>
            </div>
            <div class="action-bar-bottom" id="final-actions" style="display:none">
                <button id="save-to-device" class="btn-red">Save to Device</button>
                <button id="discard-btn" class="btn-red">Discard</button>
            </div>
        </div>

        <div class="action-bar-bottom" id="camera-controls">
            <button id="shutter" class="btn-red">Capture</button>
            <button id="cam-back" class="btn-red">Back</button>
        </div>
    </section>

    <div id="qrcode-container" style="display:none;"></div>
    <script src="script.js"></script>
</body>
</html>
