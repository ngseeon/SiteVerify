<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify v26.6-Final</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <header id="app-header">
        <div class="header-content">
            <div class="header-row-top">
                <span id="gps-status">GPS: ON</span>
                <span id="settings-gear" class="clickable-gear">⚙</span>
            </div>
            <div class="logo-area">
                <img src="siteverify_logo.png" alt="Logo" class="app-logo">
                <span class="v-num">v26.6</span>
            </div>
            <div class="header-row-bottom">
                <span id="location-display">🌐 Horizon Hills</span>
                <span id="live-clock">--/--/----, --:--:--</span>
            </div>
        </div>
        <hr class="header-divider">
    </header>

    <section id="menu-screen" class="app-screen">
        <div class="action-bar-bottom">
            <button id="nav-capture" class="btn-red">SiteVerify</button>
            <button id="nav-history" class="btn-red">History</button>
        </div>
    </section>

    <section id="input-screen" class="app-screen" style="display:none">
        <div class="form-container">
            <h1 class="screen-title">Initialization</h1>
            <div class="field">
                <label>JOB ID</label>
                <input type="text" id="job-id-input" placeholder="NIL">
            </div>
            <p class="pin-label">Security PIN: <span id="pin-display" class="red-text">00000000</span></p>
            <div class="field">
                <label>ENTER PIN</label>
                <input type="number" id="pin-verification">
            </div>
            <div class="action-bar-bottom">
                <button id="unlock-camera" class="btn-red">Unlock Camera</button>
                <button id="cancel-init" class="btn-red">Cancel</button>
            </div>
        </div>
    </section>

    <section id="camera-screen" class="app-screen camera-view" style="display:none">
        <video id="video-feed" autoplay playsinline></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        <div id="review-overlay" class="overlay-screen" style="display:none">
            <div class="preview-wrap">
                <img id="final-document" class="contain-img">
                <div id="qrcode-cache" style="display:none"></div>
            </div>
            <div class="action-bar-bottom" id="final-actions" style="display:none">
                <button id="save-to-device" class="btn-red">Save to Device</button>
                <button id="discard-btn" class="btn-red">Discard</button>
            </div>
        </div>
        <div class="action-bar-bottom" id="camera-controls">
            <button id="shutter" class="btn-red">Capture</button>
            <button id="cam-back" class="btn-red">Back</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
