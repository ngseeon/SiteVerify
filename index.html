<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify v26.0 - Unified Audit Lock</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <header id="app-header">
        <div class="header-top">
            <span id="gps-status">GPS: PENDING</span>
            <span id="settings-gear" style="cursor:pointer; font-size: 22px;">⚙</span>
        </div>
        <div class="logo-box">
            <img src="siteverify_logo.png" alt="Logo" class="app-logo">
        </div>
        <div class="header-bottom">
            <span id="location-display">🌐 Detecting...</span>
            <span id="live-clock">--/--/----, --:--:--</span>
        </div>
        <hr class="header-line">
    </header>

    <section id="menu-screen" class="app-screen">
        <div class="action-bar-bottom">
            <button id="nav-capture" class="btn-red">SiteVerify</button>
            <button id="nav-history" class="btn-red">History</button>
        </div>
    </section>

    <section id="input-screen" class="app-screen" style="display:none">
        <div class="settings-container">
            <h2 style="text-align:center;">SiteVerify Initialization</h2>
            <div class="field-group">
                <label>SiteVerify Job ID</label>
                <input type="text" id="job-id-input" maxlength="20" placeholder="Max 20 Characters">
            </div>
            <div class="field-group">
                <div id="pin-display" class="pin-box-inline">Security PIN: (Capturing...)</div>
                <input type="number" id="pin-verification" placeholder="Enter Security PIN to Unlock">
            </div>
            <button id="unlock-camera" class="btn-red-wide">Unlock Camera</button>
            <button id="cancel-input" class="btn-grey-wide">Cancel</button>
        </div>
    </section>

    <section id="settings-screen" class="app-screen" style="display:none">
        <div class="settings-container">
            <h2>System Settings</h2>
            <div class="field-group"><label>USER NAME</label><input type="text" id="set-username"></div>
            <div class="field-group"><label>USER EMAIL</label><input type="email" id="set-useremail"></div>
            <div class="field-group"><label>USER PHONE NUMBER</label><input type="text" id="set-userphone"></div>
            <div class="field-group"><label>RECIPIENT EMAIL</label><input type="email" id="set-recemail"></div>
            <div class="field-group"><label>WHATSAPP PHONE</label><input type="text" id="set-recphone"></div>
            <button id="save-settings" class="btn-red-wide">Save System Setting</button>
        </div>
    </section>

    <section id="camera-screen" class="app-screen full-view" style="display:none">
        <div class="camera-wrap">
            <video id="video-feed" autoplay playsinline></video>
        </div>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        <div id="review-overlay" class="overlay-screen" style="display:none">
            <div class="ratio-lock"><img id="final-document" class="baked-img"></div>
            <div id="save-controls" class="action-bar-bottom">
                <button id="save-to-device" class="btn-red">Save to Device</button>
                <button id="discard-btn" class="btn-red">Discard</button>
            </div>
            <div id="share-controls" class="action-bar-bottom" style="display:none">
                <button id="share-whatsapp" class="btn-red">WhatsApp</button>
                <button id="share-gmail" class="btn-red">Gmail App</button>
                <button id="final-back" class="btn-red">Back</button>
            </div>
        </div>
        <div class="action-bar-bottom" id="camera-controls">
            <button id="shutter" class="btn-red">Capture</button>
            <button id="cam-back" class="btn-red">Back</button>
        </div>
    </section>

    <div id="qrcode-temp" style="display:none;"></div>
    <script src="script.js"></script>
</body>
</html>
