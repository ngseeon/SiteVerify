<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify v17.8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>

    <header id="main-header" class="app-header">
        <div class="header-top">
            <span id="gps-status" class="gps-on">GPS : ON</span>
            <div id="settings-gear" class="gear-icon">⚙</div>
        </div>
        <div class="logo-container">
            <img src="siteverify_logo.png" alt="Logo" class="app-logo">
        </div>
        <div class="header-bottom">
            <div class="location-group">
                <span class="globe-icon">🌐</span>
                <span id="location-name">Horizon Hills</span>
            </div>
            <span id="live-clock">17 April 2026 18:30:00</span>
        </div>
        <hr class="divider">
    </header>

    <main id="app-viewport">
        <section id="settings-screen" class="form-container" style="display:none;">
            <h2 class="section-title">System Settings</h2>
            <div class="field-group"><label>User Name</label><input type="text" id="userName"></div>
            <div class="field-group"><label>User Email</label><input type="email" id="userEmail"></div>
            <div class="field-group"><label>User Phone Number</label><input type="tel" id="userHandphone"></div>
            <div class="field-group"><label>Recipient Email</label><input type="email" id="recipientEmail"></div>
            <div class="field-group"><label>Recipient Phone Number</label><input type="tel" id="whatsappPhone"></div>
            
            <div class="fixed-action-bar">
                <button id="save-settings" class="btn-red-standard">Save System Setting</button>
            </div>
        </section>

        <section id="menu-screen">
            <div class="fixed-action-bar">
                <button id="nav-capture" class="btn-red-standard">Capture</button>
                <button id="nav-history" class="btn-red-standard">History</button>
            </div>
        </section>

        <section id="camera-screen" class="full-ui" style="display:none;">
            <div class="viewfinder"><video id="video-feed" autoplay playsinline></video></div>
            <div class="fixed-action-bar">
                <button id="shutter-btn" class="btn-red-standard">Capture</button>
                <button id="camera-back" class="btn-red-standard">Back</button>
            </div>
        </section>

        <section id="pin-screen" class="full-ui" style="display:none;">
            <div class="preview-box"><img id="pin-preview" class="fit-img"></div>
            <div class="compact-pin-area">
                <div class="pin-text">Enter Security PIN: <span id="display-pin">----</span></div>
                <input type="number" id="pin-input" class="minimal-line" pattern="\d*" inputmode="numeric">
            </div>
        </section>

        <section id="confirm-screen" class="full-ui" style="display:none;">
            <div class="preview-box"><img id="confirm-preview" class="fit-img"></div>
            <div class="fixed-action-bar">
                <button id="verify-gen-btn" class="btn-red-standard">Verify & Generate</button>
            </div>
        </section>

        <section id="save-screen" class="full-ui" style="display:none;">
            <div class="preview-box"><img id="final-preview" class="fit-img"></div>
            <div class="fixed-action-bar">
                <button id="save-device" class="btn-green-standard">Save to Device</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
