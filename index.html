<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify v17.9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <span id="gps-status" class="gps-on">GPS : ON</span>
            <span id="settings-gear">⚙</span>
        </div>
        <div class="logo-container">
            <img src="siteverify_logo.png" alt="Logo" class="app-logo">
        </div>
        <div class="header-bottom">
            <span>🌐 <span id="location-name">Horizon Hills</span></span>
            <span id="live-clock">--:--:--</span>
        </div>
        <hr class="header-line">
    </header>

    <main id="app-content">
        <div id="menu-screen" class="active-screen">
            <div class="button-bar">
                <button id="nav-capture" class="btn-red">Capture</button>
                <button id="nav-history" class="btn-red">History</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
